name: Auto-tag on merge to main

on:
  push:
    branches: [main]

jobs:
  tag:
    name: Tag if version is new
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read version from crates/hub/Cargo.toml
        id: ver
        run: |
          VERSION=$(grep '^version' crates/hub/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: v$VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.version }} already exists — no release needed"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - name: Dispatch release workflow
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release.yml declares a REQUIRED workflow_dispatch input "tag" —
          # dispatching without it 422s and the release silently never runs
          # (bit every tag from v0.2.1 to v0.3.0).
          gh workflow run release.yml --ref "${{ steps.ver.outputs.version }}" \
            -f tag="${{ steps.ver.outputs.version }}"
