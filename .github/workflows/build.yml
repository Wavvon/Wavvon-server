name: Build check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    name: cargo check + test
    strategy:
      matrix:
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Fetch API spec (Wavvon docs repo)
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Wavvon/Wavvon
          sparse-checkout: |
            openapi.yaml
            scripts/check-openapi-coverage.mjs
          sparse-checkout-cone-mode: false
          path: _docs

      - name: Check every registered route is documented in openapi.yaml
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: node _docs/scripts/check-openapi-coverage.mjs "$GITHUB_WORKSPACE"

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace
