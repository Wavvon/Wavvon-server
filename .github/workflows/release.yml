name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  HUB_IMAGE: ghcr.io/${{ github.repository_owner }}/hub
  FARM_IMAGE: ghcr.io/${{ github.repository_owner }}/farm

jobs:
  changelog:
    name: Create release with changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Generate release notes (current tag only)
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: CHANGES.md
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    name: Build & push Docker images
    needs: changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout hub repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Checkout Voxply-clients (for web client build)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Voxply/Voxply-clients
          path: web-client-src

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # ---- hub image ----

      - name: Extract hub metadata
        id: hub-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.HUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push hub
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: hub/Dockerfile
          push: true
          tags: ${{ steps.hub-meta.outputs.tags }}
          labels: ${{ steps.hub-meta.outputs.labels }}
          cache-from: type=gha,scope=hub
          cache-to: type=gha,mode=max,scope=hub

      # ---- farm image ----

      - name: Extract farm metadata
        id: farm-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.FARM_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push farm
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: farm/Dockerfile
          push: true
          tags: ${{ steps.farm-meta.outputs.tags }}
          labels: ${{ steps.farm-meta.outputs.labels }}
          cache-from: type=gha,scope=farm
          cache-to: type=gha,mode=max,scope=farm

  # ---- static binaries (Linux musl — no libc deps) ----

  binaries:
    name: Build static binaries
    needs: changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust + musl targets
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Build hub (x86_64 musl)
        run: cargo build --release -p voxply-hub --target x86_64-unknown-linux-musl

      - name: Build farm (x86_64 musl)
        run: cargo build --release -p voxply-farm --target x86_64-unknown-linux-musl

      - name: Build hub (aarch64 musl)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: cargo build --release -p voxply-hub --target aarch64-unknown-linux-musl

      - name: Rename artifacts
        run: |
          cp target/x86_64-unknown-linux-musl/release/voxply-hub  voxply-hub-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/voxply-farm voxply-farm-linux-x86_64
          cp target/aarch64-unknown-linux-musl/release/voxply-hub voxply-hub-linux-aarch64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            voxply-hub-linux-x86_64
            voxply-farm-linux-x86_64
            voxply-hub-linux-aarch64
